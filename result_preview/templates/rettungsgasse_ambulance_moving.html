
<style>
  :root {
    --road-w: 160px; --shoulder-w: 80px; --row-h: 72px; --car-w: 48px; --car-h: 58px;
  }
  .scene { display:flex; flex-direction:column; align-items:center; padding:12px 0 16px; max-width:390px; margin:0 auto; user-select:none; }
  .road-wrap { position:relative; width:calc(var(--road-w) + var(--shoulder-w)*2); }
  .shoulder-l,.shoulder-r { position:absolute; top:0; bottom:0; width:var(--shoulder-w); background:#8ac08a; }
  .shoulder-l { left:0; } .shoulder-r { right:0; }
  .road-bg { position:absolute; left:var(--shoulder-w); top:0; bottom:0; width:var(--road-w); background:#4a4a4a; }
  .road-edge-l { position:absolute; left:var(--shoulder-w); top:0; bottom:0; width:3px; background:#e0e0e0; }
  .road-edge-r { position:absolute; right:var(--shoulder-w); top:0; bottom:0; width:3px; background:#e0e0e0; }
  .lane-marker { position:absolute; left:calc(var(--shoulder-w) + var(--road-w)/2 - 2px); top:0; bottom:0; width:4px;
    background:repeating-linear-gradient(to bottom,#e8c84a 0,#e8c84a 18px,transparent 18px,transparent 34px); }
  .rows-area { position:relative; }
  .row { position:relative; height:var(--row-h); }
  .car { position:absolute; top:7px; width:var(--car-w); height:var(--car-h); border-radius:6px 6px 4px 4px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    transition:left 0.4s cubic-bezier(0.4,0,0.2,1); z-index:10; }
  .car-left { background:#378ADD; } .car-right { background:#D85A30; }
  .car-window { width:34px; height:14px; background:rgba(255,255,255,0.35); border-radius:3px; margin-bottom:4px; }
  .car-strip { width:34px; height:4px; background:rgba(0,0,0,0.12); border-radius:2px; }
  .clear-ind { position:absolute; left:50%; top:0; bottom:0; transform:translateX(-50%);
    width:30px; border-left:2.5px dashed rgba(255,255,255,0.2); border-right:2.5px dashed rgba(255,255,255,0.2);
    pointer-events:none; transition:border-color 0.3s; z-index:5; }
  .clear-ind.open { border-left-color:rgba(30,200,120,0.7); border-right-color:rgba(30,200,120,0.7); }
  .passed-overlay { position:absolute; left:var(--shoulder-w); right:var(--shoulder-w); top:0; bottom:0;
    background:rgba(30,160,100,0.15); opacity:0; transition:opacity 0.4s; pointer-events:none; z-index:3; }
  .row-num { position:absolute; left:4px; top:50%; transform:translateY(-50%); font-size:10px; color:rgba(255,255,255,0.5); z-index:20; }
  .amb-layer { position:absolute; left:0; right:0; pointer-events:none; z-index:30; }
  .ambulance { position:absolute; left:50%; transform:translateX(-50%);
    width:44px; height:60px; background:#eee; border-radius:6px 6px 4px 4px;
    border:2px solid #ccc; display:flex; flex-direction:column; align-items:center; justify-content:center;
    transition:top 0.55s cubic-bezier(0.4,0,0.2,1); }
  .amb-siren { width:28px; height:8px; background:#1a6fc4; border-radius:3px; margin-bottom:3px; transition:background 0.2s; }
  .amb-siren.red { background:#e84040; }
  .amb-cross { position:relative; width:20px; height:20px; }
  .amb-cross::before,.amb-cross::after { content:''; position:absolute; background:#cc2222; border-radius:1px; }
  .amb-cross::before { width:6px; height:20px; left:7px; top:0; }
  .amb-cross::after  { width:20px; height:6px; left:0; top:7px; }
  .lion-row { height:68px; display:flex; align-items:center; justify-content:center;
    font-size:42px; position:relative; z-index:5; transition:font-size 0.3s; }
  .prog-wrap { width:calc(var(--road-w) + var(--shoulder-w)*2); height:6px;
    background:var(--color-border-tertiary); border-radius:3px; margin:8px 0 10px; overflow:hidden; }
  .prog-fill { height:100%; background:#1D9E75; border-radius:3px; transition:width 0.4s ease; }
  .status { font-size:12px; color:var(--color-text-secondary); margin-bottom:4px; text-align:center; min-height:18px; }
  .controls { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; justify-content:center; }
  .btn { padding:7px 14px; font-size:13px; border:0.5px solid var(--color-border-secondary);
    border-radius:var(--border-radius-md); background:var(--color-background-primary);
    color:var(--color-text-primary); cursor:pointer; }
  .btn:active { transform:scale(0.97); }
  .btn:disabled { opacity:0.4; cursor:default; }
  .btn-green { background:#1D9E75; color:#fff; border-color:#1D9E75; }
</style>

<div class="scene">
  <div class="status" id="statusLabel"></div>
  <div class="prog-wrap"><div class="prog-fill" id="progFill" style="width:0%"></div></div>

  <div class="road-wrap" id="roadWrap">
    <div class="shoulder-l"></div><div class="shoulder-r"></div>
    <div class="road-bg"></div>
    <div class="road-edge-l"></div><div class="road-edge-r"></div>
    <div class="lane-marker"></div>
    <div class="lion-row" id="lionBox">🦁</div>
    <div class="rows-area" id="rowsArea"></div>
    <div class="amb-layer" id="ambLayer">
      <div class="ambulance" id="amb">
        <div class="amb-siren" id="ambSiren"></div>
        <div class="amb-cross"></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn" id="prevBtn" onclick="prevStep()">← Zurück</button>
    <button class="btn btn-green" id="nextBtn" onclick="nextStep()">Weiter →</button>
    <button class="btn" onclick="resetDemo()">↺</button>
  </div>
</div>

<script>
const ROW_H = 72, CAR_W = 48, SHOULDER_W = 80, ROAD_W = 160;
const TOTAL_W = SHOULDER_W * 2 + ROAD_W;
const LION_H = 68;
const AMB_H = 60;

// x-center for each position
const POS_X = [
  SHOULDER_W / 2,
  SHOULDER_W + ROAD_W / 4,
  SHOULDER_W + (3 * ROAD_W) / 4,
  SHOULDER_W + ROAD_W + SHOULDER_W / 2,
];

// Each scenario step: rows array (top=row0=farthest) + ambulance position (which row it's at, counting from bottom; -1 = start)
// ambAt: index into rows from bottom (0 = below row6, 1 = between row6&5, ...)
const steps = [
  { rows: [[1,2],[1,2],[1,2],[1,2],[1,2],[1,2],[1,2]], ambAt: -1, label: "Alle Spuren blockiert – Krankenwagen wartet" },
  { rows: [[1,2],[1,2],[1,2],[1,2],[1,2],[1,2],[0,3]], ambAt: -1, label: "Reihe 7 macht Platz" },
  { rows: [[1,2],[1,2],[1,2],[1,2],[1,2],[1,2],[0,3]], ambAt:  0, label: "Reihe 7 ist frei – Krankenwagen fährt vor!" },
  { rows: [[1,2],[1,2],[1,2],[1,2],[1,2],[0,3],[0,3]], ambAt:  0, label: "Reihe 6 reagiert ebenfalls" },
  { rows: [[1,2],[1,2],[1,2],[1,2],[1,2],[0,3],[0,3]], ambAt:  1, label: "Weiter – Reihe 6 passiert" },
  { rows: [[1,2],[1,2],[1,2],[0,3],[0,3],[0,3],[0,3]], ambAt:  1, label: "Reihen 5+6 frei" },
  { rows: [[1,2],[1,2],[1,2],[0,3],[0,3],[0,3],[0,3]], ambAt:  3, label: "Krankenwagen fährt durch die freien Reihen" },
  { rows: [[0,3],[0,3],[0,3],[0,3],[0,3],[0,3],[0,3]], ambAt:  3, label: "Alle Reihen räumen – volle Rettungsgasse!" },
  { rows: [[0,3],[0,3],[0,3],[0,3],[0,3],[0,3],[0,3]], ambAt:  7, label: "Ziel erreicht – der Löwe ist gerettet! 🦁" },
];

let currentStep = 0;
let sirenTimer;

function carLeft(pos) { return POS_X[pos] - CAR_W / 2; }
function isClear(lp, rp) { return lp === 0 && rp === 3; }

function buildRows(rows) {
  const area = document.getElementById('rowsArea');
  area.innerHTML = '';
  // rows[0] = farthest from ambulance (top), rows[6] = nearest (bottom)
  rows.forEach((row, i) => {
    const [lp, rp] = row;
    const div = document.createElement('div');
    div.className = 'row'; div.id = 'row-' + i;

    const ov = document.createElement('div'); ov.className = 'passed-overlay'; div.appendChild(ov);
    const ci = document.createElement('div'); ci.className = 'clear-ind'; div.appendChild(ci);
    const rn = document.createElement('div'); rn.className = 'row-num';
    rn.textContent = rows.length - i; div.appendChild(rn);

    const lc = document.createElement('div'); lc.className = 'car car-left'; lc.id = 'cl-' + i;
    lc.style.left = carLeft(lp) + 'px';
    lc.innerHTML = '<div class="car-window"></div><div class="car-strip"></div>';
    div.appendChild(lc);

    const rc = document.createElement('div'); rc.className = 'car car-right'; rc.id = 'cr-' + i;
    rc.style.left = carLeft(rp) + 'px';
    rc.innerHTML = '<div class="car-window"></div><div class="car-strip"></div>';
    div.appendChild(rc);

    area.appendChild(div);
  });
}

function updateRows(rows, ambAt) {
  // ambAt: how many rows from bottom the ambulance has passed (-1=not started, 0=in row7, 7=past all)
  rows.forEach((row, i) => {
    const [lp, rp] = row;
    const rowFromBottom = rows.length - 1 - i; // row 0 (top) = rowFromBottom 6
    const passed = rowFromBottom < ambAt;
    const clear = isClear(lp, rp);

    const lc = document.getElementById('cl-' + i);
    const rc = document.getElementById('cr-' + i);
    if (lc) lc.style.left = carLeft(lp) + 'px';
    if (rc) rc.style.left = carLeft(rp) + 'px';

    const rowEl = document.getElementById('row-' + i);
    if (rowEl) {
      rowEl.querySelector('.passed-overlay').style.opacity = (clear || passed) ? '1' : '0';
      rowEl.querySelector('.clear-ind').className = 'clear-ind' + (clear ? ' open' : '');
    }
  });
}

function ambTopPx(ambAt, totalRows) {
  // ambLayer is positioned over rows-area. Lion is above rows.
  // rows-area top = 0. Each row = ROW_H px.
  // ambAt=-1: below all rows (bottom of rows area)
  // ambAt=0: in last row (row index totalRows-1)
  // ambAt=n: between row (totalRows-1-n) and (totalRows-n)
  // ambAt=totalRows: above all rows (at lion)
  const rowsAreaH = totalRows * ROW_H;
  if (ambAt < 0) return rowsAreaH - AMB_H / 2 + 8;
  if (ambAt >= totalRows) return -AMB_H + 8;
  // position in row from bottom
  const rowIdx = totalRows - 1 - ambAt;
  return rowIdx * ROW_H + (ROW_H - AMB_H) / 2;
}

function positionAmb(ambAt, totalRows) {
  const amb = document.getElementById('amb');
  const layer = document.getElementById('ambLayer');
  const rowsArea = document.getElementById('rowsArea');
  // sync layer to cover lion + rows
  const top = ambTopPx(ambAt, totalRows);
  // offset: layer starts at top of rowsArea; lion is above that
  amb.style.top = top + 'px';
}

function setLayerHeight(totalRows) {
  const layer = document.getElementById('ambLayer');
  layer.style.top = LION_H + 'px';
  layer.style.height = (totalRows * ROW_H + AMB_H) + 'px';
}

function render(stepIdx) {
  const s = steps[stepIdx];
  const totalRows = s.rows.length;

  if (stepIdx === 0) {
    buildRows(s.rows);
    setLayerHeight(totalRows);
  }
  updateRows(s.rows, s.ambAt);
  positionAmb(s.ambAt, totalRows);

  // Lion pulse on win
  const lion = document.getElementById('lionBox');
  lion.style.fontSize = s.ambAt >= totalRows ? '56px' : '42px';

  // Progress
  document.getElementById('progFill').style.width = (stepIdx / (steps.length - 1) * 100) + '%';
  document.getElementById('statusLabel').textContent = s.label;

  // Siren blink
  clearInterval(sirenTimer);
  const siren = document.getElementById('ambSiren');
  let on = false;
  sirenTimer = setInterval(() => { on = !on; siren.className = 'amb-siren' + (on ? ' red' : ''); }, 380);

  document.getElementById('prevBtn').disabled = stepIdx === 0;
  document.getElementById('nextBtn').disabled = stepIdx === steps.length - 1;
  document.getElementById('nextBtn').textContent = stepIdx === steps.length - 1 ? '✓ Ende' : 'Weiter →';
  currentStep = stepIdx;
}

function nextStep() { if (currentStep < steps.length - 1) render(currentStep + 1); }
function prevStep() { if (currentStep > 0) render(currentStep - 1); }
function resetDemo() { render(0); }

render(0);
</script>

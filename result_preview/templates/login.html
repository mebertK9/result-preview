<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zur Löwen-Rettungsgasse</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f4f4f4;
        }
        .login-box {
            background: white;
            padding: 32px 28px;
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.12);
            width: 100%;
            max-width: 340px;
        }
        .logo {
          display: block;
          margin: 0 auto;
          max-width: 300px;
        }
        h1 {
            font-size: 1.2rem;
            margin: 0 0 24px;
            text-align: center;
            color: #333;
        }
        label {
            display: block;
            font-size: 0.85rem;
            color: #555;
            margin-bottom: 4px;
        }
        input[type=text], input[type=password] {
            width: 100%;
            padding: 10px;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-bottom: 16px;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #4a8;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
        }
        button:hover { background: #3a7; }
        .error {
            color: #c00;
            font-size: 0.85rem;
            margin-bottom: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1> 
            <img src="{{ url_for('static', filename='logo.png') }}" class="logo">
            Zur Löwen-Rettungsgasse
        </h1>
        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}
        <form method="POST" action="/login">
            <label for="username">Benutzername</label>
            <input type="text" id="username" name="username"
                   autocomplete="username" autofocus>
            <label for="password">Passwort</label>
            <input type="password" id="password" name="password"
                   autocomplete="current-password">
            <button type="submit">Anmelden</button>
        </form>
    </div>
</body>
</html>
